<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14161c">
<title>Phrase Lab</title>
<style>
  :root{
    --bg:#14161c; --panel:#1c1f29; --panel2:#232735; --line:#2e3340;
    --ink:#e9ecf2; --ink-dim:#9aa3b2; --ink-faint:#5e6678;
    --ref:#5ad1c8; --you:#ff9d4d; --hot:#ff5470; --ok:#7bdc8b;
    --r:14px;
    --mono:"SF Mono",ui-monospace,"Roboto Mono",monospace;
    --sans:-apple-system,"Segoe UI",Roboto,system-ui,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);overscroll-behavior:none}
  body{padding:14px 14px 40px;max-width:560px;margin:0 auto}
  .top{display:flex;justify-content:space-between;align-items:flex-start}
  h1{font-size:15px;letter-spacing:.14em;text-transform:uppercase;margin:2px 0;font-weight:700}
  .sub{color:var(--ink-faint);font-size:11px;letter-spacing:.03em;margin:0 0 14px}
  .lang{display:flex;background:var(--panel2);border-radius:9px;padding:2px;gap:2px}
  .lang button{padding:5px 9px;font-size:11px;background:transparent;color:var(--ink-dim);
    border:0;border-radius:7px;font-family:var(--mono);font-weight:600}
  .lang button.on{background:var(--panel);color:var(--ink)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:12px}
  .card h2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);
    margin:0 0 10px;font-weight:600;display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.ref{background:var(--ref)} .dot.you{background:var(--you)}
  button{font-family:var(--sans);font-size:14px;border:0;border-radius:11px;padding:11px 14px;
    background:var(--panel2);color:var(--ink);font-weight:600;cursor:pointer;
    transition:transform .04s,background .15s;touch-action:manipulation}
  button:active{transform:scale(.97)}
  button:disabled{opacity:.34;cursor:not-allowed}
  .row{display:flex;gap:8px;flex-wrap:wrap}.row>*{flex:1 1 auto}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--ink-dim)}
  .rec{background:var(--hot);color:#fff}
  .rec.armed{animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,84,112,.55)}50%{box-shadow:0 0 0 9px rgba(255,84,112,0)}}
  .playref{background:rgba(90,209,200,.16);color:var(--ref);border:1px solid rgba(90,209,200,.35)}
  .playyou{background:rgba(255,157,77,.16);color:var(--you);border:1px solid rgba(255,157,77,.4)}
  canvas{width:100%;display:block;border-radius:9px;background:var(--panel2)}
  .wavewrap{position:relative}
  .handles{position:absolute;inset:0;pointer-events:none}
  .handle{position:absolute;top:0;bottom:0;width:30px;margin-left:-15px;pointer-events:auto;touch-action:none;cursor:ew-resize}
  .handle::before{content:"";position:absolute;left:14px;top:0;bottom:0;width:2px;background:var(--ref)}
  .handle.pinL::after,.handle.pinR::after{content:"";position:absolute;top:calc(50% - 5px);
    width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent}
  .handle.pinL::after{left:3px;border-right:7px solid var(--ref)}
  .handle.pinR::after{right:3px;border-left:7px solid var(--ref)}
  .region{position:absolute;top:0;bottom:0;background:rgba(90,209,200,.10);
    border-left:1px solid rgba(90,209,200,.4);border-right:1px solid rgba(90,209,200,.4)}
  .playhead{position:absolute;top:0;bottom:0;width:1.5px;background:var(--hot);left:0;display:none}
  .cursor{position:absolute;top:0;bottom:0;width:1.5px;background:var(--ink-dim);left:0;display:none;opacity:.7}
  label.file{display:block;text-align:center}
  input[type=file]{display:none}
  textarea{width:100%;min-height:80px;background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:10px;padding:10px;font-size:15px;font-family:var(--sans);line-height:1.5;resize:vertical}
  .lyrics{margin-top:4px;max-height:48vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .lyrics::-webkit-scrollbar{width:6px}
  .lyrics::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .lyric{padding:7px 11px;font-size:16px;line-height:1.4;color:var(--ink)}
  .seg{display:flex;background:var(--panel2);border-radius:11px;padding:3px;gap:3px}
  .seg button{flex:1;background:transparent;padding:8px 0;font-size:13px;font-family:var(--mono);color:var(--ink-dim)}
  .seg button.on{background:var(--panel);color:var(--ink)}
  .meta{font-family:var(--mono);font-size:11px;color:var(--ink-faint);display:flex;justify-content:space-between;margin-top:8px}
  .hint{font-size:11px;color:var(--ink-faint);line-height:1.55;margin-top:8px}
  .panels{display:flex;gap:10px;margin-top:12px}
  .panel{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px}
  .panel h3{font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin:0 0 7px;font-weight:600;
    display:flex;align-items:center;gap:6px;color:var(--ink-dim)}
  .panel canvas{height:74px;background:var(--bg)}
  .wavemini{position:relative}
  .minihead{position:absolute;top:0;bottom:0;width:2px;background:var(--hot);left:0;display:none}
  .meter{height:9px;background:var(--bg);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .meter > i{display:block;height:100%;width:0%;background:var(--ok);border-radius:6px}
  .panel .prow{display:flex;gap:6px;margin-top:8px}
  .panel .prow button{flex:1;padding:9px 0;font-size:13px}
  .panel.empty-state canvas{opacity:.3}
  .empty{color:var(--ink-faint);font-size:13px;text-align:center;padding:18px 6px}
  .scorerow{display:flex;align-items:center;gap:13px;padding:12px 0;border-top:1px solid var(--line)}
  .scorerow:first-child{border-top:0}
  .scorenum{font-family:var(--mono);font-size:27px;font-weight:700;width:58px;text-align:right;line-height:1}
  .scoremeta{flex:1;min-width:0}
  .scorelabel{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);font-weight:600}
  .scoreline{font-size:13px;color:var(--ink);margin-top:3px;line-height:1.4}
  .confwrap{display:flex;align-items:center;gap:6px;margin-top:6px}
  .confbar{flex:1;height:5px;background:var(--panel2);border-radius:3px;overflow:hidden}
  .confbar > i{display:block;height:100%;border-radius:3px}
  .conftext{font-size:10px;color:var(--ink-faint);letter-spacing:.04em}
  .demoted .scorenum{color:var(--ink-faint)}
  .syncbig{background:var(--ref);color:#06231f;font-size:17px;padding:16px;width:100%;margin-top:8px;display:none}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#000;color:#fff;
    padding:10px 16px;border-radius:30px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:9}
  .toast.show{opacity:.94}
  a.mini{color:var(--ref);font-size:11px;cursor:pointer}
  details{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:4px 13px;margin-bottom:12px}
  summary{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);
    font-weight:600;padding:9px 0;cursor:pointer;list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:"＋ ";color:var(--ref)}
  details[open] summary::before{content:"− "}
  .help{font-size:13.5px;line-height:1.65;color:var(--ink-dim);padding:0 0 10px}
  .help b{color:var(--ink)} .help ol{padding-left:20px;margin:6px 0} .help li{margin:5px 0}
</style>
</head>
<body>

<div class="top">
  <div><h1>Phrase Lab</h1><p class="sub" data-i18n="tagline"></p></div>
  <div class="lang">
    <button id="ljp" class="on">日本語</button><button id="len">EN</button>
  </div>
</div>

<details>
  <summary data-i18n="help_title"></summary>
  <div class="help" id="helpBody"></div>
</details>

<!-- REFERENCE -->
<div class="card">
  <h2><span class="dot ref"></span><span data-i18n="ref_h"></span></h2>
  <div id="noRef">
    <label class="file"><input type="file" id="refFile" accept="audio/*">
      <span style="display:block;padding:11px;background:var(--panel2);border-radius:11px;color:var(--ref);font-weight:600" data-i18n="choose"></span>
    </label>
    <p class="hint" data-i18n="ref_hint"></p>
  </div>
  <div id="refUI" style="display:none">
    <div class="wavewrap">
      <canvas id="wave" height="120"></canvas>
      <div class="handles" id="handles">
        <div class="region" id="region"></div>
        <div class="handle a" id="hA"></div><div class="handle b" id="hB"></div>
        <div class="playhead" id="head"></div>
        <div class="cursor" id="cur"></div>
      </div>
    </div>
    <div class="meta"><span id="regLabel"></span></div>
    <div class="row" id="zoomRow" style="margin-top:8px">
      <button class="ghost" id="panL" style="flex:1">◀</button>
      <button class="ghost" id="zoomOut" style="flex:1">－</button>
      <button class="ghost" id="zoomIn" style="flex:1">＋</button>
      <button class="ghost" id="panR" style="flex:1">▶</button>
    </div>
    <div class="row" id="transport" style="margin-top:10px">
      <button class="ghost" id="tBack" style="flex:0 0 66px">−10s</button>
      <button class="playref" id="tPlay" style="flex:1;font-size:16px">▶</button>
      <button class="ghost" id="tFwd" style="flex:0 0 66px">+10s</button>
    </div>
    <div class="seg" style="margin-top:8px" id="topMode">
      <button data-m="all" class="on" data-i18n="play_all"></button>
      <button data-m="sel" data-i18n="play_sel"></button>
    </div>
    <p class="hint" data-i18n="transport_hint"></p>
    <p class="hint" data-i18n="drag_hint"></p>
  </div>
</div>

<!-- PRACTICE -->
<div class="card">
  <h2><span class="dot you"></span><span data-i18n="practice_h"></span></h2>
  <div class="row">
    <button class="rec" id="recBtn" disabled></button>
  </div>
  <div class="meter" id="micMeter" style="margin-top:8px;display:none"><i id="micLevel"></i></div>
  <div id="recStatus" style="margin-top:8px;min-height:18px;font-size:13px;font-weight:600;
    padding:8px 10px;border-radius:9px;background:var(--panel2);text-align:center;color:var(--ink-faint)"></div>
  <div class="panels">
    <div class="panel" id="clipPanel">
      <h3><span class="dot ref"></span><span data-i18n="clip_h"></span></h3>
      <div class="wavemini"><canvas id="clipWave" height="74"></canvas><div class="minihead" id="clipHead"></div></div>
      <div class="prow">
        <button class="playref" id="clipPlay">▶</button>
        <button class="ghost" id="clipLoopBtn" data-i18n="loop_off"></button>
      </div>
      <div class="seg" style="margin-top:6px" id="speed">
        <button data-s="0.6">0.6×</button><button data-s="0.8">0.8×</button><button data-s="1" class="on">1×</button>
      </div>
    </div>
    <div class="panel empty-state" id="takePanel">
      <h3><span class="dot you"></span><span data-i18n="take_h"></span></h3>
      <div class="wavemini"><canvas id="takeWave" height="74"></canvas><div class="minihead" id="takeHead"></div></div>
      <div class="prow">
        <button class="playyou" id="takePlay" disabled>▶</button>
        <button class="ghost" id="takeLoopBtn" disabled data-i18n="loop_off"></button>
      </div>
    </div>
  </div>
</div>

<!-- SCORE -->
<div class="card">
  <h2><span class="dot" style="background:var(--ref)"></span><span data-i18n="score_h"></span></h2>
  <button class="playref" id="scoreBtn" disabled data-i18n="score_btn" style="width:100%"></button>
  <div id="scoreOut"></div>
  <div id="scoreHint" class="hint" data-i18n="score_idle"></div>
</div>

<!-- LYRICS -->
<div class="card">
  <h2 data-i18n="lyrics_h"></h2>
  <div id="lyricView" class="lyrics"></div>
  <p class="hint" data-i18n="lyrics_hint"></p>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const toast=m=>{const t=$("toast");t.textContent=m;t.classList.add("show");
  clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),1800);};

/* ============ I18N ============ */
const I18N={
ja:{
  tagline:"聴く・繰り返す・録音する・比べる — 1フレーズずつ",
  help_title:"ヘルプ",
  ref_h:"お手本の音源", choose:"スマホから音源を選ぶ",
  ref_hint:"権利のある短い音源を使ってください。ボーカルのみの音源（AIで分離した声、またはトリ／デールの歌だけ）だと、ピッチの線がきれいに出ます。",
  change:"音源を変える",
  play_phrase:"▶ フレーズを再生", loop:"リピート", on:"オン", off:"オフ",
  drag_hint:"水色のつまみをドラッグして練習する1行を囲みます。",
  transport_hint:"波形をタップでその位置から再生。−10s/+10sで移動。「全体／選択」で再生範囲を切替。",
  practice_h:"練習", take_h:"あなたの録音", clip_h:"お手本クリップ", loop_off:"リピート", loop_on:"リピート中",
  play_all:"全体", play_sel:"選択範囲", lyrics_h:"歌詞", lyrics_hint:"歌詞をスクロールして見られます。",
  score_h:"採点", score_btn:"このテイクを採点", score_idle:"フレーズを録音してから採点できます。", score_need:"先に録音してください", score_analyzing:"分析中…",
  rhythm:"リズム", intonation:"イントネーション", melody:"メロディ", conf_low:"信頼度 低", conf_med:"信頼度 中", conf_high:"信頼度 高",
  rec:"● 録音", stop:"■ 停止",
  msg_loaded:"お手本を読み込みました", msg_badaudio:"この音源を読み込めませんでした",
  msg_recfail:"録音を処理できませんでした",
  help:`<b>使い方</b>
  <ol>
    <li><b>上の波形</b>で練習する場所を探す。タップでその位置から再生、−10s/+10sで移動、「全体／選択」で再生範囲を切替。＋/－で拡大・縮小、◀/▶で左右に移動。</li>
    <li>水色のつまみをドラッグして1行を囲む。囲んだ範囲は<b>左のクリップ</b>に表示されます。</li>
    <li><b>左（お手本）</b>の▶でそのフレーズを再生。リピートや速度（0.6/0.8/1×）で練習。</li>
    <li><b>録音</b>を押して自分の声を録る（お手本は流れません。ヘッドホン推奨）。録音中は<b>緑のメーター</b>が動きます（動かない＝マイク無音）。もう一度押して停止。</li>
    <li><b>右（あなた）</b>の▶で自分の録音を再生。リピートも可。各プレーヤーには再生位置の線が出ます。</li>
    <li><b>採点</b>を押すと、リズム・イントネーション・メロディを0〜100で表示。各項目に信頼度バーと一言アドバイスが付きます（数字は目安。お手本はボーカルのみの音源が前提）。</li>
    <li>左と右を交互に聴いて、発音とイントネーションを近づける。</li>
  </ol>
  <b>マイク：</b>httpsのリンク（github.io）で開き、許可してください。録音できない時は、アドレス左の鍵アイコン→マイク→許可→再読み込み。`
},
en:{
  tagline:"Listen · loop · record · compare — one phrase at a time",
  help_title:"Help",
  ref_h:"Reference clip", choose:"Choose audio from phone",
  ref_hint:"A short clip you have the rights to. A vocal-only file (AI-split voice, or Tori/Dale singing dry) gives the cleanest pitch line.",
  change:"change clip",
  play_phrase:"▶ Play phrase", loop:"Loop", on:"on", off:"off",
  drag_hint:"Drag the teal handles to box the line you want to practice.",
  transport_hint:"Tap the waveform to play from there. −10s/+10s to move. All / Sel switches what plays.",
  practice_h:"Practice", take_h:"Your take", clip_h:"Original clip", loop_off:"Repeat", loop_on:"Repeating",
  play_all:"All", play_sel:"Selection", lyrics_h:"Lyrics", lyrics_hint:"Scroll to read the lyrics.",
  score_h:"Score", score_btn:"Score this take", score_idle:"Record a take of the boxed phrase, then score it.", score_need:"Record a take first", score_analyzing:"Analyzing…",
  rhythm:"Rhythm", intonation:"Intonation", melody:"Melody", conf_low:"low confidence", conf_med:"medium confidence", conf_high:"high confidence",
  rec:"● Record", stop:"■ Stop",
  msg_loaded:"Reference loaded", msg_badaudio:"Couldn't read that audio file",
  msg_recfail:"Couldn't process recording",
  help:`<b>How to practice</b>
  <ol>
    <li>Use the <b>top waveform</b> to find the spot — tap to play from there, −10s/+10s to move, and the <b>All / Sel</b> toggle to play the whole song or just the selection. ＋/－ zoom in/out, ◀/▶ pan.</li>
    <li>Drag the teal handles to box one line. The boxed part shows in the <b>left clip</b>.</li>
    <li><b>Left (original):</b> press ▶ to hear the phrase; use Repeat and 0.6/0.8/1× speed to drill it.</li>
    <li><b>Record</b> your voice (the original does not play — use headphones). The <b>green meter</b> moves while recording (flat = mic is muted). Press again to stop.</li>
    <li><b>Right (you):</b> press ▶ to hear your take; Repeat if you like. Each player shows a progress line.</li>
    <li><b>Score</b> rates Rhythm, Intonation, and Melody 0–100, each with a confidence bar and a one-line tip (the numbers are a guide; assumes a vocal-only reference).</li>
    <li>Go back and forth between left and right to match pronunciation and intonation.</li>
  </ol>
  <b>Mic:</b> open the https link (github.io) and allow the mic. If it won't record: lock icon (left of the address) → Microphone → Allow → refresh.`
}
};
let LANG=localStorage.getItem("phraselab_lang")||"ja";
const t=k=>I18N[LANG][k];
function applyLang(){
  document.documentElement.lang=LANG;
  document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>el.placeholder=t(el.dataset.i18nPh));
  $("helpBody").innerHTML=t("help");
  $("recBtn").textContent=armed?t("stop"):t("rec");
  $("clipLoopBtn").textContent=clipLoop?t("loop_on"):t("loop_off");
  $("takeLoopBtn").textContent=takeLoop?t("loop_on"):t("loop_off");
  $("ljp").classList.toggle("on",LANG==="ja"); $("len").classList.toggle("on",LANG==="en");
  if(refBuf)updRegLabel();
  renderLyrics();
}
$("ljp").onclick=()=>{LANG="ja";localStorage.setItem("phraselab_lang","ja");applyLang();};
$("len").onclick=()=>{LANG="en";localStorage.setItem("phraselab_lang","en");applyLang();};

/* ============ AUDIO CORE ============ */
let AC; const ctx=()=>AC||(AC=new (window.AudioContext||window.webkitAudioContext)());
let refBuf=null, regA=0, regB=1, speed=1, refSrc=null, headRAF=null;
let playPos=0, refMode="", clipLoop=false, topMode="all";

async function loadRef(arrbuf){
  try{ refBuf=await ctx().decodeAudioData(arrbuf); }
  catch(e){ toast(t("msg_badaudio")); return; }
  regA=0; regB=1; viewStart=0; viewLen=1;
  $("noRef").style.display="none"; $("refUI").style.display="block"; $("recBtn").disabled=false;
  drawWave(); layoutHandles(); updRegLabel(); drawClip(); playPos=0; setCursor(); updTransportBtn(); toast(t("msg_loaded"));
}
$("refFile").addEventListener("change",async e=>{const f=e.target.files[0];if(f)loadRef(await f.arrayBuffer());});

// auto-load clip + sync hosted next to this page
(async()=>{
  for(const n of ["reference.m4a","reference.mp3","reference.wav","reference.ogg"]){
    try{const r=await fetch(n);if(r.ok){loadRef(await r.arrayBuffer());break;}}catch(_){}
  }
  // load lyrics text from the repo (read-only display)
  for(const n of ["reference.txt","lyrics.txt"]){
    try{const r=await fetch(n,{cache:"no-store"});if(r.ok){
      const txt=(await r.text()).replace(/\r/g,"");
      if(txt.trim()){localStorage.setItem(LS_TXT,txt); lines=txt.split("\n"); applyLang();}
      break;
    }}catch(_){}
  }
})();

/* ---- waveform (with zoom view) ---- */
let viewStart=0, viewLen=1;            // visible window as fractions of the song
const wave=$("wave");
function drawWave(){
  const dpr=devicePixelRatio||1,w=wave.clientWidth,h=wave.clientHeight;
  wave.width=w*dpr;wave.height=h*dpr;const g=wave.getContext("2d");g.scale(dpr,dpr);
  g.clearRect(0,0,w,h); if(!refBuf)return;
  const data=refBuf.getChannelData(0);
  const s0=Math.floor(viewStart*data.length),s1=Math.floor((viewStart+viewLen)*data.length);
  const span=Math.max(1,s1-s0),step=Math.max(1,Math.floor(span/w));
  g.strokeStyle="#5b6275";g.lineWidth=1;g.beginPath();
  for(let x=0;x<w;x++){let min=1,max=-1;const base=s0+x*step;

/* ============ SCORE: rhythm / intonation / melody ============ */
function sClamp(x,a,b){return Math.max(a,Math.min(b,x));}
function sClamp01(x){return sClamp(x,0,1);}
function jp(){return LANG==="ja";}

// per-frame pitch (semitones) + clarity via normalized autocorrelation
function framePitch(ch,start,len,sr){
  let rms=0;for(let i=0;i<len;i++){const v=ch[start+i]||0;rms+=v*v;}
  rms=Math.sqrt(rms/len);
  if(rms<0.006)return {semi:null,clarity:0};
  let c0=0;for(let i=0;i<len;i++){const v=ch[start+i]||0;c0+=v*v;}
  const minLag=Math.floor(sr/600),maxLag=Math.floor(sr/90);
  let bestLag=-1,best=0;
  for(let lag=minLag;lag<maxLag;lag++){
    let s=0;for(let i=0;i+lag<len;i++)s+=(ch[start+i]||0)*(ch[start+i+lag]||0);
    const norm=s/(c0||1);
    if(norm>best){best=norm;bestLag=lag;}
  }
  if(bestLag<=0||best<0.3)return {semi:null,clarity:best};
  const f0=sr/bestLag;
  return {semi:69+12*Math.log2(f0/440),clarity:best};
}
function features(ch,s0,s1,sr){
  const win=Math.round(sr*0.04),hop=Math.round(sr*0.02);
  const env=[],semi=[],cla=[];
  for(let p=s0;p+win<s1;p+=hop){
    let e=0;for(let i=0;i<win;i++){const v=ch[p+i]||0;e+=v*v;}
    env.push(Math.sqrt(e/win));
    const fp=framePitch(ch,p,win,sr);semi.push(fp.semi);cla.push(fp.clarity);
  }
  return {env,semi,cla};
}
function trimByEnergy(f){
  let mx=1e-9;for(const v of f.env)if(v>mx)mx=v;const th=mx*0.12;
  let a=0,b=f.env.length-1;
  while(a<b&&f.env[a]<th)a++;while(b>a&&f.env[b]<th)b--;
  return {env:f.env.slice(a,b+1),semi:f.semi.slice(a,b+1),cla:f.cla.slice(a,b+1)};
}
function capFrames(F,max){const n=F.env.length;if(n<=max)return F;const step=n/max;
  const env=[],semi=[],cla=[];
  for(let k=0;k<max;k++){const idx=Math.floor(k*step);env.push(F.env[idx]);semi.push(F.semi[idx]);cla.push(F.cla[idx]);}
  return {env,semi,cla};}
function norm01(arr){let mx=1e-9;for(const v of arr)if(v>mx)mx=v;return arr.map(v=>v/mx);}
function dtw(a,b){
  const n=a.length,m=b.length,INF=1e18,D=[];
  for(let i=0;i<=n;i++)D.push(new Float64Array(m+1).fill(INF));
  D[0][0]=0;
  for(let i=1;i<=n;i++)for(let j=1;j<=m;j++){
    const c=Math.abs(a[i-1]-b[j-1]);
    D[i][j]=c+Math.min(D[i-1][j],D[i][j-1],D[i-1][j-1]);}
  let i=n,j=m;const path=[];
  while(i>0&&j>0){path.push([i-1,j-1]);
    const dd=D[i-1][j-1],du=D[i-1][j],dl=D[i][j-1];
    if(dd<=du&&dd<=dl){i--;j--;}else if(du<=dl)i--;else j--;}
  path.reverse();return {cost:D[n][m],path};
}
function pearson(xs,ys){const n=xs.length;if(n<3)return 0;
  let mx=0,my=0;for(let i=0;i<n;i++){mx+=xs[i];my+=ys[i];}mx/=n;my/=n;
  let sxy=0,sxx=0,syy=0;
  for(let i=0;i<n;i++){const dx=xs[i]-mx,dy=ys[i]-my;sxy+=dx*dy;sxx+=dx*dx;syy+=dy*dy;}
  if(sxx<1e-9||syy<1e-9)return 0;return sxy/Math.sqrt(sxx*syy);}
function smedian(a){if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y),m=s.length>>1;
  return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function sstd(a){if(a.length<2)return 0;const m=a.reduce((x,y)=>x+y,0)/a.length;
  return Math.sqrt(a.reduce((s,v)=>s+(v-m)*(v-m),0)/a.length);}

function analyze(){
  if(!refBuf||!youBuf)return null;
  const sr=refBuf.sampleRate;
  const rs=Math.floor(regA*refBuf.length),re=Math.floor(regB*refBuf.length);
  let R=capFrames(trimByEnergy(features(refBuf.getChannelData(0),rs,re,sr)),320);
  let T=capFrames(trimByEnergy(features(youBuf.getChannelData(0),0,youBuf.length,youBuf.sampleRate)),320);
  if(R.env.length<8||T.env.length<8)return {tooShort:true};
  const {cost,path}=dtw(norm01(R.env),norm01(T.env));
  const meanCost=cost/path.length;
  const rp=[],tp=[],cl=[];
  for(const pr of path){const i=pr[0],j=pr[1];
    if(R.semi[i]!=null&&T.semi[j]!=null&&R.cla[i]>0.4&&T.cla[j]>0.4){
      rp.push(R.semi[i]);tp.push(T.semi[j]);cl.push(Math.min(R.cla[i],T.cla[j]));}}
  // rhythm
  const rhythm=sClamp(Math.round(100*(1-meanCost/0.34)),0,100);
  const L=path.length,rN=Math.max(1,R.env.length-1),tN=Math.max(1,T.env.length-1);
  const segErr=[[0,L/3],[L/3,2*L/3],[2*L/3,L]].map(seg=>{let s=0,c=0;
    for(let k=Math.floor(seg[0]);k<Math.floor(seg[1]);k++){const p=path[k];s+=(p[1]/tN)-(p[0]/rN);c++;}
    return c?s/c:0;});
  // intonation (shape) + melody (notes)
  let intonation=0,corr=0,flat=false,melody=0,offset=0,medErr=99;
  if(rp.length>=8){
    corr=pearson(rp,tp);intonation=sClamp(Math.round(100*Math.max(0,corr)),0,100);
    flat=sstd(tp)<0.6*sstd(rp);
    const diffs=rp.map((r,k)=>r-tp[k]);offset=smedian(diffs);
    const errs=rp.map((r,k)=>Math.abs((tp[k]+offset)-r));medErr=smedian(errs);
    melody=sClamp(Math.round(100*(1-medErr/3)),0,100);}
  // confidence from signal quality
  let voiced=0;for(let i=0;i<T.semi.length;i++)if(T.semi[i]!=null&&T.cla[i]>0.4)voiced++;
  const voicedT=voiced/Math.max(1,T.semi.length);
  const avgCla=cl.length?cl.reduce((a,b)=>a+b,0)/cl.length:0;
  const lenFac=sClamp01(T.env.length/40),pairFac=sClamp01(rp.length/24);
  const cRhythm=sClamp01(lenFac*(1-sClamp01(meanCost/0.6)));
  const cPitch=sClamp01(pairFac*avgCla*sClamp01(voicedT/0.5));
  return {rhythm,intonation,melody,offset,corr,flat,segErr,
    conf:{rhythm:cRhythm,intonation:cPitch,melody:cPitch}};
}

function confTier(c){return c<0.4?"low":c<0.7?"med":"high";}
function rhythmLine(a){
  const names=jp()?["最初","中間","最後"]:["the start","the middle","the end"];
  let mi=0;for(let i=1;i<3;i++)if(Math.abs(a.segErr[i])>Math.abs(a.segErr[mi]))mi=i;
  const e=a.segErr[mi];
  if(a.rhythm>=82)return jp()?"タイミングはばっちり。":"Timing is solid.";
  if(Math.abs(e)<0.03)return jp()?"タイミングはおおむね良好。":"Timing is mostly there.";
  const dir=e>0?(jp()?"走り気味":"rushing"):(jp()?"もたり気味":"dragging");
  return jp()?names[mi]+"で"+dir+"です。":"You're "+dir+" at "+names[mi]+".";
}
function intoLine(a){
  if(a.intonation>=80)return jp()?"イントネーションの形がお手本によく合っています。":"Your intonation closely follows the reference.";
  if(a.flat)return jp()?"お手本より平坦です。高い所を上げ、低い所を下げて。":"Flatter than the reference — lift the highs and drop the lows more.";
  if(a.corr<0.2)return jp()?"上がり下がりがお手本とずれています。":"Your rise-and-fall drifts from the reference.";
  return jp()?"イントネーションはまずまず。もう少し抑揚を。":"Intonation is close — push the rise and fall a bit more.";
}
function melodyLine(a){
  if(a.melody>=80)return jp()?"音程（メロディ）はよく合っています。":"Your notes track the melody well.";
  if(Math.abs(a.offset)>=9)return jp()?"オクターブ違いで歌っています（形が合えばOK）。":"You're singing in a different octave (fine if the shape matches).";
  const semis=Math.round(a.offset);
  if(Math.abs(semis)>=2)return jp()?"全体で約"+Math.abs(semis)+"半音ずれています。":"About "+Math.abs(semis)+" semitones off key overall.";
  return jp()?"ところどころ音を外しています。":"A few notes drift off the melody.";
}
function numColor(s){return s>=80?"var(--ok)":s>=55?"#e7b84b":"var(--hot)";}
function confColor(c){return c>=0.7?"var(--ok)":c>=0.4?"#e7b84b":"var(--hot)";}
function scoreRow(label,score,conf,line,demoteLow){
  const demoted=demoteLow&&conf<0.4;
  const num=demoted?'<div class="scorenum">—</div>':'<div class="scorenum" style="color:'+numColor(score)+'">'+score+'</div>';
  const lowMsg=jp()?"信頼度が低く採点できません（ボーカルのみの音源で再録音を）。":"Too low-confidence to score — use a clean vocal-only reference.";
  return '<div class="scorerow'+(demoted?' demoted':'')+'">'+num+
    '<div class="scoremeta"><div class="scorelabel">'+label+'</div>'+
    '<div class="scoreline">'+(demoted?lowMsg:line)+'</div>'+
    '<div class="confwrap"><div class="confbar"><i style="width:'+Math.round(conf*100)+'%;background:'+confColor(conf)+'"></i></div>'+
    '<span class="conftext">'+t("conf_"+confTier(conf))+'</span></div></div></div>';
}
$("scoreBtn").addEventListener("click",()=>{
  if(!youBuf){$("scoreHint").textContent=t("score_need");return;}
  $("scoreHint").textContent=t("score_analyzing");$("scoreOut").innerHTML="";
  setTimeout(()=>{
    let a;try{a=analyze();}catch(err){$("scoreHint").textContent=String(err);return;}
    if(!a||a.tooShort){$("scoreHint").textContent=jp()?"クリップが短すぎます。":"Clip too short to analyze.";return;}
    $("scoreHint").textContent="";
    $("scoreOut").innerHTML=
      scoreRow(t("rhythm"),a.rhythm,a.conf.rhythm,rhythmLine(a),false)+
      scoreRow(t("intonation"),a.intonation,a.conf.intonation,intoLine(a),false)+
      scoreRow(t("melody"),a.melody,a.conf.melody,melodyLine(a),true);
  },30);
});

/* ============ LYRICS + SYNC ============ */
const LS_TXT="phraselab_lyrics";
let lines=[];
function renderLyrics(){
  const v=$("lyricView");v.innerHTML="";
  if(!lines.length)return;
  lines.forEach(ln=>{if(!ln.trim())return;
    const d=document.createElement("div");d.className="lyric";d.textContent=ln;
    v.appendChild(d);});
}
(function init(){const x=localStorage.getItem(LS_TXT);
  if(x)lines=x.split("\n");
  applyLang();})();
</script>
