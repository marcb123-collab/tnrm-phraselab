<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14161c">
<title>Phrase Lab</title>
<style>
  :root{
    --bg:#14161c; --panel:#1c1f29; --panel2:#232735; --line:#2e3340;
    --ink:#e9ecf2; --ink-dim:#9aa3b2; --ink-faint:#5e6678;
    --ref:#5ad1c8; --you:#ff9d4d; --hot:#ff5470; --ok:#7bdc8b;
    --r:14px;
    --mono:"SF Mono",ui-monospace,"Roboto Mono",monospace;
    --sans:-apple-system,"Segoe UI",Roboto,system-ui,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);overscroll-behavior:none}
  body{padding:14px 14px 40px;max-width:560px;margin:0 auto}
  .top{display:flex;justify-content:space-between;align-items:flex-start}
  h1{font-size:15px;letter-spacing:.14em;text-transform:uppercase;margin:2px 0;font-weight:700}
  .sub{color:var(--ink-faint);font-size:11px;letter-spacing:.03em;margin:0 0 14px}
  .lang{display:flex;background:var(--panel2);border-radius:9px;padding:2px;gap:2px}
  .lang button{padding:5px 9px;font-size:11px;background:transparent;color:var(--ink-dim);
    border:0;border-radius:7px;font-family:var(--mono);font-weight:600}
  .lang button.on{background:var(--panel);color:var(--ink)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:12px}
  .card h2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);
    margin:0 0 10px;font-weight:600;display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.ref{background:var(--ref)} .dot.you{background:var(--you)}
  button{font-family:var(--sans);font-size:14px;border:0;border-radius:11px;padding:11px 14px;
    background:var(--panel2);color:var(--ink);font-weight:600;cursor:pointer;
    transition:transform .04s,background .15s;touch-action:manipulation}
  button:active{transform:scale(.97)}
  button:disabled{opacity:.34;cursor:not-allowed}
  .row{display:flex;gap:8px;flex-wrap:wrap}.row>*{flex:1 1 auto}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--ink-dim)}
  .rec{background:var(--hot);color:#fff}
  .rec.armed{animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,84,112,.55)}50%{box-shadow:0 0 0 9px rgba(255,84,112,0)}}
  .playref{background:rgba(90,209,200,.16);color:var(--ref);border:1px solid rgba(90,209,200,.35)}
  .playyou{background:rgba(255,157,77,.16);color:var(--you);border:1px solid rgba(255,157,77,.4)}
  canvas{width:100%;display:block;border-radius:9px;background:var(--panel2)}
  .wavewrap{position:relative}
  .handles{position:absolute;inset:0;pointer-events:none}
  .handle{position:absolute;top:0;bottom:0;width:30px;margin-left:-15px;pointer-events:auto;touch-action:none;cursor:ew-resize}
  .handle::before{content:"";position:absolute;left:14px;top:0;bottom:0;width:2px;background:var(--ref)}
  .region{position:absolute;top:0;bottom:0;background:rgba(90,209,200,.10);
    border-left:1px solid rgba(90,209,200,.4);border-right:1px solid rgba(90,209,200,.4)}
  .playhead{position:absolute;top:0;bottom:0;width:1.5px;background:var(--hot);left:0;display:none}
  .cursor{position:absolute;top:0;bottom:0;width:1.5px;background:var(--ink-dim);left:0;display:none;opacity:.7}
  label.file{display:block;text-align:center}
  input[type=file]{display:none}
  textarea{width:100%;min-height:80px;background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:10px;padding:10px;font-size:15px;font-family:var(--sans);line-height:1.5;resize:vertical}
  .lyrics{margin-top:4px;max-height:48vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .lyrics::-webkit-scrollbar{width:6px}
  .lyrics::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .lyric{padding:7px 11px;font-size:16px;line-height:1.4;color:var(--ink)}
  .seg{display:flex;background:var(--panel2);border-radius:11px;padding:3px;gap:3px}
  .seg button{flex:1;background:transparent;padding:8px 0;font-size:13px;font-family:var(--mono);color:var(--ink-dim)}
  .seg button.on{background:var(--panel);color:var(--ink)}
  .meta{font-family:var(--mono);font-size:11px;color:var(--ink-faint);display:flex;justify-content:space-between;margin-top:8px}
  .hint{font-size:11px;color:var(--ink-faint);line-height:1.55;margin-top:8px}
  .panels{display:flex;gap:10px;margin-top:12px}
  .panel{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px}
  .panel h3{font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin:0 0 7px;font-weight:600;
    display:flex;align-items:center;gap:6px;color:var(--ink-dim)}
  .panel canvas{height:74px;background:var(--bg)}
  .panel .prow{display:flex;gap:6px;margin-top:8px}
  .panel .prow button{flex:1;padding:9px 0;font-size:13px}
  .panel.empty-state canvas{opacity:.3}
  .empty{color:var(--ink-faint);font-size:13px;text-align:center;padding:18px 6px}
  .syncbig{background:var(--ref);color:#06231f;font-size:17px;padding:16px;width:100%;margin-top:8px;display:none}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#000;color:#fff;
    padding:10px 16px;border-radius:30px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:9}
  .toast.show{opacity:.94}
  a.mini{color:var(--ref);font-size:11px;cursor:pointer}
  details{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:4px 13px;margin-bottom:12px}
  summary{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);
    font-weight:600;padding:9px 0;cursor:pointer;list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:"＋ ";color:var(--ref)}
  details[open] summary::before{content:"− "}
  .help{font-size:13.5px;line-height:1.65;color:var(--ink-dim);padding:0 0 10px}
  .help b{color:var(--ink)} .help ol{padding-left:20px;margin:6px 0} .help li{margin:5px 0}
</style>
</head>
<body>

<div class="top">
  <div><h1>Phrase Lab</h1><p class="sub" data-i18n="tagline"></p></div>
  <div class="lang">
    <button id="ljp" class="on">日本語</button><button id="len">EN</button>
  </div>
</div>

<details>
  <summary data-i18n="help_title"></summary>
  <div class="help" id="helpBody"></div>
</details>

<!-- REFERENCE -->
<div class="card">
  <h2><span class="dot ref"></span><span data-i18n="ref_h"></span></h2>
  <div id="noRef">
    <label class="file"><input type="file" id="refFile" accept="audio/*">
      <span style="display:block;padding:11px;background:var(--panel2);border-radius:11px;color:var(--ref);font-weight:600" data-i18n="choose"></span>
    </label>
    <p class="hint" data-i18n="ref_hint"></p>
  </div>
  <div id="refUI" style="display:none">
    <div class="wavewrap">
      <canvas id="wave" height="120"></canvas>
      <div class="handles" id="handles">
        <div class="region" id="region"></div>
        <div class="handle a" id="hA"></div><div class="handle b" id="hB"></div>
        <div class="playhead" id="head"></div>
        <div class="cursor" id="cur"></div>
      </div>
    </div>
    <div class="meta"><span id="regLabel"></span></div>
    <div class="row" id="transport" style="margin-top:10px">
      <button class="ghost" id="tBack" style="flex:0 0 66px">−10s</button>
      <button class="playref" id="tPlay" style="flex:1;font-size:16px">▶</button>
      <button class="ghost" id="tFwd" style="flex:0 0 66px">+10s</button>
    </div>
    <p class="hint" data-i18n="transport_hint"></p>
    <p class="hint" data-i18n="drag_hint"></p>
  </div>
</div>

<!-- PRACTICE -->
<div class="card">
  <h2><span class="dot you"></span><span data-i18n="practice_h"></span></h2>
  <div class="row">
    <button class="rec" id="recBtn" disabled></button>
  </div>
  <div id="recStatus" class="hint" style="margin-top:8px;min-height:16px"></div>
  <div class="panels">
    <div class="panel" id="clipPanel">
      <h3><span class="dot ref"></span><span data-i18n="clip_h"></span></h3>
      <canvas id="clipWave" height="74"></canvas>
      <div class="prow">
        <button class="playref" id="clipPlay">▶</button>
        <button class="ghost" id="clipLoopBtn" data-i18n="loop_off"></button>
      </div>
      <div class="seg" style="margin-top:6px" id="speed">
        <button data-s="0.6">0.6×</button><button data-s="0.8">0.8×</button><button data-s="1" class="on">1×</button>
      </div>
    </div>
    <div class="panel empty-state" id="takePanel">
      <h3><span class="dot you"></span><span data-i18n="take_h"></span></h3>
      <canvas id="takeWave" height="74"></canvas>
      <div class="prow">
        <button class="playyou" id="takePlay" disabled>▶</button>
        <button class="ghost" id="takeLoopBtn" disabled data-i18n="loop_off"></button>
      </div>
    </div>
  </div>
</div>

<!-- LYRICS -->
<div class="card">
  <h2 data-i18n="lyrics_h"></h2>
  <div id="lyricView" class="lyrics"></div>
  <p class="hint" data-i18n="lyrics_hint"></p>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const toast=m=>{const t=$("toast");t.textContent=m;t.classList.add("show");
  clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),1800);};

/* ============ I18N ============ */
const I18N={
ja:{
  tagline:"聴く・繰り返す・録音する・比べる — 1フレーズずつ",
  help_title:"ヘルプ",
  ref_h:"お手本の音源", choose:"スマホから音源を選ぶ",
  ref_hint:"権利のある短い音源を使ってください。ボーカルのみの音源（AIで分離した声、またはトリ／デールの歌だけ）だと、ピッチの線がきれいに出ます。",
  change:"音源を変える",
  play_phrase:"▶ フレーズを再生", loop:"リピート", on:"オン", off:"オフ",
  drag_hint:"水色のつまみをドラッグして練習する1行を囲みます。",
  transport_hint:"波形をタップするとその位置から再生。▶/■で再生・停止、−10s/+10sで10秒戻る・進む。",
  practice_h:"練習", take_h:"あなたの録音", clip_h:"お手本クリップ", loop_off:"リピート", loop_on:"リピート中", drag_hint:"水色のつまみをドラッグして練習する1行を囲みます。",
  take_h:"あなたの録音", rec:"● 録音", stop:"■ 停止", play_mine:"▶ 自分のを再生",
  hear_ref:"お手本を聴く", then_mine:"次に自分のを",
  leg_ref:"お手本", leg_you:"あなた", leg_axis:"↑ 高い ・ → 時間",
  pitch_hint:"オレンジの形を水色に合わせます。水色が上がっているのにオレンジが平らなら、音程が上がっていないサイン。そこを直しましょう。",
  pitch_empty:"フレーズに合わせて録音すると、お手本の隣にあなたのピッチが表示されます。",
  lyrics_h:"歌詞（読む用）", lyrics_ph:"ここに歌詞を貼り付け（1行ずつ）…",
  save_lyrics:"歌詞を保存", mark_done:"この行をできた ✓", edit:"編集",
  lyrics_hint:"歌詞をスクロールして見られます。行をタップすると場所を覚えておけます。",
  sync_start:"歌詞を合わせる（タップ開始）", sync_tap:"行の頭でタップ", sync_done_btn:"合わせ直す",
  sync_clear:"同期をクリア", sync_copy:"同期データをコピー",
  msg_loaded:"お手本を読み込みました", msg_badaudio:"この音源を読み込めませんでした",
  msg_micblock:"マイクがブロックされています（httpsと許可が必要）",
  msg_got:"録音できました — 下で比べてください", msg_recfail:"録音を処理できませんでした",
  msg_lyrsaved:"歌詞を保存しました", msg_tapfirst:"先に行をタップしてください",
  msg_synced:"同期完了 — 歌詞をタップでそのフレーズへ", msg_synccleared:"同期をクリアしました",
  msg_synccopied:"同期データをコピーしました", msg_addlyr:"先に歌詞を保存してください",
  msg_nopitch:"はっきりした音程が検出できません — ボーカルのみの音源で試してください",
  help:`<b>使い方</b>
  <ol>
    <li>お手本の音源を読み込む（<b>ボーカルのみ</b>の音源がベスト）。</li>
    <li>歌詞を貼り付けて「歌詞を保存」。</li>
    <li>（任意）<b>歌詞を合わせる</b>を押し、再生に合わせて各行の頭でタップ。以降は歌詞をタップするとそのフレーズに移動します。</li>
    <li>水色のつまみをドラッグ、または同期した行をタップして1行を囲む。</li>
    <li><b>録音</b>を押すとフレーズが流れるので一緒に歌う。終わったら停止。</li>
    <li><b>お手本を聴く → 自分のを</b>で聴き比べ、オレンジのピッチを水色に合わせる。</li>
    <li>うまくいったら「この行をできた ✓」。</li>
  </ol>
  <b>コツ：</b>イントネーションの確認は1×で。マイクはhttpsのリンクと許可が必要です。Android Chrome推奨。`
},
en:{
  tagline:"Listen · loop · record · compare — one phrase at a time",
  help_title:"Help",
  ref_h:"Reference clip", choose:"Choose audio from phone",
  ref_hint:"A short clip you have the rights to. A vocal-only file (AI-split voice, or Tori/Dale singing dry) gives the cleanest pitch line.",
  change:"change clip",
  play_phrase:"▶ Play phrase", loop:"Loop", on:"on", off:"off",
  drag_hint:"Drag the teal handles to box the line you want to practice.",
  transport_hint:"Tap the waveform to play from there. ▶/■ to play/stop, −10s/+10s to jump back or ahead 10 seconds.",
  practice_h:"Practice", take_h:"Your take", clip_h:"Original clip", loop_off:"Repeat", loop_on:"Repeating", drag_hint:"Drag the teal handles to box the line you want to practice.",
  take_h:"Your take", rec:"● Record", stop:"■ Stop", play_mine:"▶ Play mine",
  hear_ref:"Hear theirs", then_mine:"then mine",
  leg_ref:"reference", leg_you:"you", leg_axis:"↑ higher · → time",
  pitch_hint:"Match the orange shape to the teal one. Flat orange where teal rises = you're not lifting the note. Fix that.",
  pitch_empty:"Record over a phrase and your pitch line appears next to the reference.",
  lyrics_h:"Lyrics (reading aid)", lyrics_ph:"Paste the lyrics here, one line per line…",
  save_lyrics:"Save lyrics", mark_done:"Mark this line ✓", edit:"Edit",
  lyrics_hint:"Scroll to read the lyrics. Tap a line to keep your place.",
  sync_start:"Sync lyrics (start tapping)", sync_tap:"Tap at line start", sync_done_btn:"Re-sync",
  sync_clear:"Clear sync", sync_copy:"Copy sync data",
  msg_loaded:"Reference loaded", msg_badaudio:"Couldn't read that audio file",
  msg_micblock:"Mic blocked — needs https + permission",
  msg_got:"Got it — compare below", msg_recfail:"Couldn't process recording",
  msg_lyrsaved:"Lyrics saved", msg_tapfirst:"Tap a line first",
  msg_synced:"Synced — tap a line to jump to that phrase", msg_synccleared:"Sync cleared",
  msg_synccopied:"Sync data copied", msg_addlyr:"Save lyrics first",
  msg_nopitch:"No clear pitch detected — try a vocal-only reference",
  help:`<b>How to practice</b>
  <ol>
    <li>Load a reference clip (a <b>vocal-only</b> file works best).</li>
    <li>Paste the lyrics and Save.</li>
    <li>(Optional) <b>Sync lyrics</b>: press it, then tap at the start of each line as it plays. After that, tapping a line jumps to that phrase.</li>
    <li>Drag the teal handles, or tap a synced line, to box one line.</li>
    <li>Press <b>Record</b> — the phrase plays so you sing along. Stop when done.</li>
    <li><b>Hear theirs → then mine</b>, and match the orange pitch line to the teal.</li>
    <li>When it's solid, mark the line ✓.</li>
  </ol>
  <b>Tips:</b> use 1× for intonation; the mic needs an https link + permission. Android Chrome recommended.`

};
let LANG=localStorage.getItem("phraselab_lang")||"ja";
const t=k=>I18N[LANG][k];
function applyLang(){
  document.documentElement.lang=LANG;
  document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>el.placeholder=t(el.dataset.i18nPh));
  $("helpBody").innerHTML=t("help");
  $("recBtn").textContent=armed?t("stop"):t("rec");
  $("clipLoopBtn").textContent=clipLoop?t("loop_on"):t("loop_off");
  $("takeLoopBtn").textContent=takeLoop?t("loop_on"):t("loop_off");
  $("ljp").classList.toggle("on",LANG==="ja"); $("len").classList.toggle("on",LANG==="en");
  if(refBuf)updRegLabel();
  renderLyrics();
}
$("ljp").onclick=()=>{LANG="ja";localStorage.setItem("phraselab_lang","ja");applyLang();};
$("len").onclick=()=>{LANG="en";localStorage.setItem("phraselab_lang","en");applyLang();};

/* ============ AUDIO CORE ============ */
let AC; const ctx=()=>AC||(AC=new (window.AudioContext||window.webkitAudioContext)());
let refBuf=null, regA=0, regB=1, speed=1, refSrc=null, headRAF=null;
let playPos=0, refMode="", clipLoop=false;

async function loadRef(arrbuf){
  try{ refBuf=await ctx().decodeAudioData(arrbuf); }
  catch(e){ toast(t("msg_badaudio")); return; }
  regA=0; regB=1;
  $("noRef").style.display="none"; $("refUI").style.display="block"; $("recBtn").disabled=false;
  drawWave(); layoutHandles(); updRegLabel(); drawClip(); playPos=0; setCursor(); updTransportBtn(); toast(t("msg_loaded"));
}
$("refFile").addEventListener("change",async e=>{const f=e.target.files[0];if(f)loadRef(await f.arrayBuffer());});

// auto-load clip + sync hosted next to this page
(async()=>{
  for(const n of ["reference.m4a","reference.mp3","reference.wav","reference.ogg"]){
    try{const r=await fetch(n);if(r.ok){loadRef(await r.arrayBuffer());break;}}catch(_){}
  }
  // load lyrics text from the repo (read-only display)
  for(const n of ["reference.txt","lyrics.txt"]){
    try{const r=await fetch(n,{cache:"no-store"});if(r.ok){
      const txt=(await r.text()).replace(/\r/g,"");
      if(txt.trim()){localStorage.setItem(LS_TXT,txt); lines=txt.split("\n"); applyLang();}
      break;
    }}catch(_){}
  }
})();

/* ---- waveform ---- */
const wave=$("wave");
function drawWave(){
  const dpr=devicePixelRatio||1,w=wave.clientWidth,h=wave.clientHeight;
  wave.width=w*dpr;wave.height=h*dpr;const g=wave.getContext("2d");g.scale(dpr,dpr);
  g.clearRect(0,0,w,h); if(!refBuf)return;
  const data=refBuf.getChannelData(0),step=Math.max(1,Math.floor(data.length/w));
  g.strokeStyle="#5b6275";g.lineWidth=1;g.beginPath();
  for(let x=0;x<w;x++){let min=1,max=-1;
    for(let i=0;i<step;i++){const v=data[x*step+i]||0;if(v<min)min=v;if(v>max)max=v;}
    g.moveTo(x,(1-(max*0.9+1)/2)*h);g.lineTo(x,(1-(min*0.9+1)/2)*h);}
  g.stroke();
}
/* ---- handles ---- */
const handles=$("handles"); const px=p=>p*handles.clientWidth;
function layoutHandles(){$("hA").style.left=px(regA)+"px";$("hB").style.left=px(regB)+"px";
  const r=$("region");r.style.left=px(regA)+"px";r.style.width=px(regB-regA)+"px";}
function updRegLabel(){if(!refBuf)return;const d=refBuf.duration;
  $("regLabel").textContent=(LANG==="ja"?"フレーズ ":"phrase ")+(regA*d).toFixed(2)+"–"+(regB*d).toFixed(2)+"s";}
function dragHandle(el,isA){
  const move=ev=>{const c=ev.touches?ev.touches[0]:ev,rect=handles.getBoundingClientRect();
    let p=(c.clientX-rect.left)/rect.width;p=Math.max(0,Math.min(1,p));
    if(isA)regA=Math.min(p,regB-0.01);else regB=Math.max(p,regA+0.01);
    layoutHandles();updRegLabel();drawClip();};
  const up=()=>{["touchmove","mousemove"].forEach(e=>document.removeEventListener(e,move));
    ["touchend","mouseup"].forEach(e=>document.removeEventListener(e,up));};
  const down=ev=>{ev.preventDefault();
    document.addEventListener("touchmove",move,{passive:false});document.addEventListener("mousemove",move);
    document.addEventListener("touchend",up);document.addEventListener("mouseup",up);};
  el.addEventListener("touchstart",down,{passive:false});el.addEventListener("mousedown",down);
}
dragHandle($("hA"),true);dragHandle($("hB"),false);
addEventListener("resize",()=>{if(refBuf){drawWave();layoutHandles();drawClip();}if(youBuf)drawTake();});

/* ---- small-panel waveform drawer ---- */
function drawInto(cv,ch,s,e){
  const dpr=devicePixelRatio||1,w=cv.clientWidth,h=cv.clientHeight;
  cv.width=w*dpr;cv.height=h*dpr;const g=cv.getContext("2d");g.scale(dpr,dpr);g.clearRect(0,0,w,h);
  if(!ch||e<=s)return;
  const n=e-s,step=Math.max(1,Math.floor(n/w));
  g.strokeStyle="#6b7488";g.lineWidth=1;g.beginPath();
  for(let x=0;x<w;x++){let mn=1,mx=-1;
    for(let i=0;i<step;i++){const v=ch[s+x*step+i]||0;if(v<mn)mn=v;if(v>mx)mx=v;}
    g.moveTo(x,(1-(mx*0.9+1)/2)*h);g.lineTo(x,(1-(mn*0.9+1)/2)*h);}
  g.stroke();
}
function drawClip(){if(!refBuf)return;
  const s=Math.floor(regA*refBuf.length),e=Math.floor(regB*refBuf.length);
  drawInto($("clipWave"),refBuf.getChannelData(0),s,e);}
function drawTake(){if(!youBuf)return;
  drawInto($("takeWave"),youBuf.getChannelData(0),0,youBuf.length);}

/* ---- selector transport (whole song) ---- */
function setCursor(){if(!refBuf)return;const c=$("cur");c.style.display="block";
  c.style.left=px(Math.min(playPos/refBuf.duration,1))+"px";}
function updTransportBtn(){$("tPlay").textContent=refMode==="transport"?"■":"▶";}
function updClipBtn(){$("clipPlay").textContent=refMode==="clip"?"■":"▶";}
function stopRef(){if(refSrc){try{refSrc.stop()}catch(_){}refSrc=null;}
  if(headRAF)cancelAnimationFrame(headRAF);$("head").style.display="none";
  refMode="";updTransportBtn();updClipBtn();if(refBuf)setCursor();}
function transportPlay(from){
  if(!refBuf)return;stopRef();ctx().resume();
  playPos=Math.max(0,Math.min(from,refBuf.duration-0.02));
  const s=ctx().createBufferSource();s.buffer=refBuf;s.connect(ctx().destination);
  s.start(0,playPos);refSrc=s;refMode="transport";
  $("cur").style.display="none";
  const t0=ctx().currentTime,start=playPos,head=$("head");head.style.display="block";
  const tick=()=>{playPos=start+(ctx().currentTime-t0);
    head.style.left=px(Math.min(playPos/refBuf.duration,1))+"px";
    if(playPos<refBuf.duration&&refMode==="transport")headRAF=requestAnimationFrame(tick);
    else{if(playPos>=refBuf.duration)playPos=0;stopRef();}};
  tick();
  s.onended=()=>{if(refSrc===s){if(playPos>=refBuf.duration-0.05)playPos=0;stopRef();}};
  updTransportBtn();updClipBtn();
}
function seekBy(d){if(!refBuf)return;
  const np=Math.max(0,Math.min(playPos+d,refBuf.duration-0.02));
  if(refMode==="transport")transportPlay(np);else{playPos=np;setCursor();}}
$("tPlay").addEventListener("click",()=>{if(refMode==="transport")stopRef();else transportPlay(playPos);});
$("tBack").addEventListener("click",()=>seekBy(-10));
$("tFwd").addEventListener("click",()=>seekBy(10));
wave.addEventListener("click",e=>{if(!refBuf)return;
  const rect=wave.getBoundingClientRect();let r=(e.clientX-rect.left)/rect.width;
  r=Math.max(0,Math.min(1,r));transportPlay(r*refBuf.duration);});

/* ---- LEFT panel: play the selected clip ---- */
function playClip(){
  if(!refBuf)return;stopRef();ctx().resume();
  const off=regA*refBuf.duration,dur=(regB-regA)*refBuf.duration;
  const s=ctx().createBufferSource();s.buffer=refBuf;s.playbackRate.value=speed;
  s.connect(ctx().destination);s.loop=clipLoop;s.loopStart=off;s.loopEnd=regB*refBuf.duration;
  s.start(0,off,clipLoop?undefined:dur);refSrc=s;refMode="clip";
  const t0=ctx().currentTime,head=$("head");head.style.display="block";
  const tick=()=>{let e=(ctx().currentTime-t0)*speed;if(clipLoop)e=e%dur;
    const p=(off+e)/refBuf.duration;head.style.left=px(Math.min(p,regB))+"px";
    if((clipLoop||e<dur)&&refMode==="clip")headRAF=requestAnimationFrame(tick);
    else if(!clipLoop)stopRef();};
  tick();
  if(!clipLoop)s.onended=()=>{if(refSrc===s)stopRef();};
  updClipBtn();updTransportBtn();
}
$("clipPlay").addEventListener("click",()=>{if(refMode==="clip")stopRef();else playClip();});
$("clipLoopBtn").addEventListener("click",()=>{clipLoop=!clipLoop;
  $("clipLoopBtn").textContent=clipLoop?t("loop_on"):t("loop_off");
  $("clipLoopBtn").style.color=clipLoop?"var(--ref)":"";
  if(refMode==="clip")playClip();});
$("speed").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  [...$("speed").children].forEach(x=>x.classList.remove("on"));b.classList.add("on");speed=parseFloat(b.dataset.s);
  if(refMode==="clip")playClip();});

/* ---- record (mic only) ---- */
let mediaRec=null,chunks=[],youBuf=null,youBlob=null,youURL=null,youAudio=null,stream=null,armed=false,takeLoop=false,takePlaying=false;
const RS=()=>$("recStatus");
function status(m,c){RS().textContent=m;RS().style.color=c||"var(--ink-faint)";}
async function ensureMic(){if(stream&&stream.active)return stream;
  stream=await navigator.mediaDevices.getUserMedia({audio:true});return stream;}
function pickMime(){for(const m of ["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg",""])
  {if(m===""||(window.MediaRecorder&&MediaRecorder.isTypeSupported(m)))return m;}return "";}
$("recBtn").addEventListener("click",async()=>{
  if(armed){try{mediaRec.requestData()}catch(_){}try{mediaRec.stop()}catch(_){}return;}
  stopRef();
  if(!window.MediaRecorder){status("MediaRecorder not supported in this browser","var(--hot)");return;}
  status(LANG==="ja"?"マイクを準備中…":"Starting mic…");
  try{await ensureMic();}
  catch(e){status((LANG==="ja"?"マイク不可: ":"Mic error: ")+((e&&e.name)||"error")+(LANG==="ja"?"（鍵アイコン→マイクを許可）":" (lock icon - allow mic)"),"var(--hot)");return;}
  chunks=[];const mm=pickMime();
  try{mediaRec=mm?new MediaRecorder(stream,{mimeType:mm}):new MediaRecorder(stream);}
  catch(e){mediaRec=new MediaRecorder(stream);}
  mediaRec.ondataavailable=ev=>{if(ev.data&&ev.data.size)chunks.push(ev.data);};
  mediaRec.onstop=async()=>{armed=false;const b=$("recBtn");b.classList.remove("armed");b.textContent=t("rec");
    if(!chunks.length){status(LANG==="ja"?"録音できませんでした（音声なし）":"No audio captured - check mic permission","var(--hot)");return;}
    youBlob=new Blob(chunks,{type:mediaRec.mimeType||"audio/webm"});
    if(youURL)URL.revokeObjectURL(youURL);youURL=URL.createObjectURL(youBlob);
    $("takePlay").disabled=false;$("takeLoopBtn").disabled=false;$("takePanel").classList.remove("empty-state");
    status((LANG==="ja"?"保存しました ✓ ":"Saved ✓ ")+Math.round(youBlob.size/1024)+" KB","var(--ok)");
    try{youBuf=await ctx().decodeAudioData(await youBlob.arrayBuffer());drawTake();}
    catch(e){youBuf=null;drawInto($("takeWave"),null,0,0);}
  };
  mediaRec.start(250);armed=true;const b=$("recBtn");b.classList.add("armed");b.textContent=t("stop");
  status(LANG==="ja"?"● 録音中… もう一度押して停止":"● Recording... press again to stop","var(--hot)");
});

/* ---- RIGHT panel: play the recorded take (independent) ---- */
function stopTake(){if(youAudio){try{youAudio.pause()}catch(_){}}takePlaying=false;$("takePlay").textContent="▶";}
function playTake(){if(!youURL)return;ctx().resume();
  if(youAudio){try{youAudio.pause()}catch(_){}}
  youAudio=new Audio(youURL);youAudio.loop=takeLoop;
  youAudio.onended=()=>{if(!takeLoop){takePlaying=false;$("takePlay").textContent="▶";}};
  youAudio.play().then(()=>{takePlaying=true;$("takePlay").textContent="■";})
    .catch(()=>status(LANG==="ja"?"再生できません":"Can't play take","var(--hot)"));}
$("takePlay").addEventListener("click",()=>{if(takePlaying)stopTake();else playTake();});
$("takeLoopBtn").addEventListener("click",()=>{takeLoop=!takeLoop;
  $("takeLoopBtn").textContent=takeLoop?t("loop_on"):t("loop_off");
  $("takeLoopBtn").style.color=takeLoop?"var(--you)":"";
  if(youAudio)youAudio.loop=takeLoop;});

["pointerdown","keydown","touchstart"].forEach(e=>document.addEventListener(e,()=>{try{ctx().resume()}catch(_){}},{passive:true}));

/* ============ LYRICS + SYNC ============ */
const LS_TXT="phraselab_lyrics";
let lines=[];
function renderLyrics(){
  const v=$("lyricView");v.innerHTML="";
  if(!lines.length)return;
  lines.forEach(ln=>{if(!ln.trim())return;
    const d=document.createElement("div");d.className="lyric";d.textContent=ln;
    v.appendChild(d);});
}
(function init(){const x=localStorage.getItem(LS_TXT);
  if(x)lines=x.split("\n");
  applyLang();})();
</script>
